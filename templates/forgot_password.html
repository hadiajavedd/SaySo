<!DOCTYPE html>
<html>
<head>
<title>SaySo - Forgot Password</title>
<!-- link to the stylesheet for styling across all pages -->
<link rel="stylesheet" href="/static/style.css">
<style>
/* shared styles for error and success message boxes */
.message-box {
padding: 12px 16px;
border-radius: 10px;
font-size: 14px;
font-weight: 600;
margin-bottom: 16px;
text-align: center;
        }
/* red styling for error messages like wrong username or email */
.message-error {
background: #fff1f3;
color: #a61b37;
border: 1px solid rgba(166,27,55,0.2);
        }
/* green styling for success messages */
.message-success {
background: #f0faf4;
color: #1a7a40;
border: 1px solid rgba(26,122,64,0.2);
        }
/* styling for the description text at the top of the card */
.forgot-desc {
color: #555;
font-size: 14px;
line-height: 1.6;
margin-bottom: 20px;
text-align: center;
        }
/* styling for the back to login link at the bottom */
.back-link {
text-align: center;
margin-top: 14px;
        }
.back-link a {
color: #6b1f2b;
font-size: 13px;
font-weight: 600;
text-decoration: none;
        }
.back-link a:hover {
text-decoration: underline;
        }
</style>
</head>
<body>
<!-- centered card layout used for all auth pages -->
<div class="auth-page">
<div class="auth-card">
<h1>Forgot Password</h1>
<!-- note for user -->
<p class="forgot-desc">
            Enter your username and the email address linked to your account to continue resetting your password.
</p>
        <!-- error message if the credentials dont match database-->
        {% if error %}
<div class="message-box message-error">{{ error }}</div>
        {% endif %}
        <!-- success message shown if a reset was successful -->
        {% if success %}
<div class="message-box message-success">{{ success }}</div>
        {% endif %}
        <!-- form submits to the forgot_password route in app.py via POST (create) -->
        <!-- app.py checks if the username and email match a user in the database -->
<form method="POST" action="/forgot-password">
<label>Username</label>
<input type="text" name="username" required>
<label>Email address</label>
<input type="email" name="email" placeholder="you@example.com" required>
<button type="submit">Continue</button>
</form>
<!-- link back to the login page -->
<p class="back-link">
<a href="/">← Back to Login</a>
</p>
</div>
</div>
</body>
</html>
