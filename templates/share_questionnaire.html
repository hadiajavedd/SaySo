<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Share Questionnaire</title>
<!-- link to the stylesheet for styling across all pages -->
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="public-container">
<!-- shows the questionnaire title being shared, passed from app.py -->
<h1 class="public-title">Share Questionnaire: <span id="qTitle">{{ q_title }}</span></h1>
<!-- shareable link generated by build_share_url in app.py -->
<div class="share-link">
<input type="text" id="shareLink" value="{{ share_url }}" readonly>
</div>
<!-- qr code image generated in app.py using the qrcode library, passed in as base64 -->
<div class="qr-code">
<img id="qrImage" src="data:image/png;base64,{{ qr_code }}" alt="QR Code">
</div>
<!-- buttons to copying the link and going back -->
<button class="primary-btn" onclick="copyLink()">Copy Link</button>
<button class="secondary-btn" onclick="window.history.back()">Back</button>
</div>
<script>
// selects the text in the share link input and copies it to the clipboard
function copyLink() {
const linkInput = document.getElementById('shareLink');
linkInput.select();
linkInput.setSelectionRange(0, 99999);
document.execCommand("copy");
alert("Link copied to clipboard!");
}
</script>
</body>
</html>
