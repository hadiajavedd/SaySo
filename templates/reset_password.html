<!DOCTYPE html>
<html>
<head>
<title>SaySo - Reset Password</title>
<!-- link to the stylesheet for styling across all pages -->
<link rel="stylesheet" href="/static/style.css">
<style>
/* shared styles for the error message box */
.message-box {
padding: 12px 16px;
border-radius: 10px;
font-size: 14px;
font-weight: 600;
margin-bottom: 16px;
text-align: center;
        }
/* red styling for error messages */
.message-error {
background: #fff1f3;
color: #a61b37;
border: 1px solid rgba(166,27,55,0.2);
        }
/* styling for the description text at the top of the card */
.reset-desc {
color: #555;
font-size: 14px;
line-height: 1.6;
margin-bottom: 20px;
text-align: center;
        }
</style>
</head>
<body>
<!-- centered card layout used for all auth pages -->
<div class="auth-page">
<div class="auth-card">
<h1>Reset Password</h1>
<!-- note -->
<p class="reset-desc">Enter and confirm your new password below.</p>
        <!-- error message if passwords dont match or fields are empty -->
        {% if error %}
<div class="message-box message-error">{{ error }}</div>
        {% endif %}
        <!-- form submits to the reset_password_page route in app.py via POST  (create)-->
        <!-- the token in the url is used by app.py to find which user is resetting their password -->
<form method="POST" action="/reset-password/{{ token }}">
<label>New Password</label>
<input type="password" name="password" placeholder="New password" required>
<label>Confirm New Password</label>
<input type="password" name="confirm_password" placeholder="Confirm new password" required>
<button type="submit">Update Password</button>
</form>
</div>
</div>
</body>
</html>
