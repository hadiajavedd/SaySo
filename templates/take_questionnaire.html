<!DOCTYPE html>
<html>
<head>
<title>Take Questionnaire - {{ questionnaire.title }}</title>
<!-- link to the stylesheet for styling across all pages -->
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="public-container public-wide">
<!-- questionnaire title passed in from app.py -->
<h1 class="public-title">{{ questionnaire.title }}</h1>
<!-- form that submits all answers to the take_questionnaire_page route in app.py via POST -->
<form method="POST" class="take-form">
<!-- loops through each question in the questionnaire -->
        {% for q in questionnaire.questions %}
<div class="take-question">
<!-- displays the question number and text, loop.index gives the current position in the loop -->
<label class="take-label">Q{{ loop.index }}: {{ q.text }}</label>
<!-- show a text input for written response questions -->
                {% if q.qtype == "text" %}
<input class="take-input" type="text" name="q{{ q.id }}" required>
<!-- show a yes or no dropdown for yesno questions -->
                {% elif q.qtype == "yesno" %}
<select class="take-select" name="q{{ q.id }}" required>
<option value="" disabled selected>Select an answer</option>
<option value="Yes">Yes</option>
<option value="No">No</option>
</select>
<!-- show a 1 to 5 dropdown for scale questions -->
                {% elif q.qtype == "scale" %}
<select class="take-select" name="q{{ q.id }}" required>
<option value="" disabled selected>Select a rating</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
</select>
<!-- fallback to a text input if question type is not recognised -->
                {% else %}
<input class="take-input" type="text" name="q{{ q.id }}" required>
                {% endif %}
</div>
        {% endfor %}
<!-- submits all answers to app.py which saves them as a new Response row in the database -->
<button class="primary-btn" type="submit">Submit Answers</button>
</form>
</div>
</body>
</html>
